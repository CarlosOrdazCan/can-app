<!DOCTYPE html>
<html lang="es">
<head>
    <script>
  if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
  }
</script>
<meta charset="UTF-8">
<title>Modo Letras</title>

<style>
:root { --primary: #00d2ff; }
body{
  margin:0;
  background:#050505;
  color:white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align:center;
}

/* CONTENIDO */
#lyricsContainer{
  padding:60px 40px;
}

/* TITULO */
h1{
  font-size:45px;
  margin-bottom:40px;
  font-weight: 900;
  text-transform: uppercase;
  color: var(--primary);
}

/* LETRA */
.lyrics{
  font-size:32px;
  line-height:1.8;
  white-space:pre-line;
}

/* CONTROLES */
.controls{
  position:fixed;
  bottom:30px;
  width:100%;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.controls button{
  padding:15px 30px;
  margin:5px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  background:rgba(15, 15, 20, 0.4);
  backdrop-filter: blur(20px);
  color:white;
  font-size: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.controls button:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }

/* SCROLL */
.scroll-controls{
  position:fixed;
  right:30px;
  top:50%;
  transform: translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:15px;
}

.scroll-controls button{
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  background:rgba(15, 15, 20, 0.4);
  backdrop-filter: blur(20px);
  color:white;
  font-size: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.scroll-controls button:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }

/* OCULTAR UI */
.hidden{
  opacity:0;
}
</style>

</head>
<body>

<div id="lyricsContainer"></div>

<div class="controls">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<div class="scroll-controls">
  <button onclick="startScroll()">▶</button>
  <button onclick="stopScroll()">⏸</button>
</div>

<script>

/* =========================
   VARIABLES
========================= */
let setlist = JSON.parse(localStorage.getItem("liveSetlist")) || [];
let index = 0;

/* =========================
   LIMPIAR ACORDES
========================= */
const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

function removeChords(text){

  return text.split("\n").map(line => {

    return line.split(" ").filter(word => {

      return !notes.includes(word);

    }).join(" ");

  }).join("\n");
}

/* =========================
   RENDER
========================= */
function render(){

  const song = setlist[index];

  if(!song){
    document.getElementById("lyricsContainer").innerHTML = "<h2>No hay canciones</h2>";
    return;
  }

  let html = `<h1>${song.name}</h1>`;

  song.sections.forEach(sec => {

    html += `
      <div class="lyrics">
        ${removeChords(sec.chords || sec.content || "")}
      </div>
    `;
  });

  document.getElementById("lyricsContainer").innerHTML = html;
}

/* =========================
   NAV
========================= */
function next(){
  if(index < setlist.length - 1){
    index++;
    window.scrollTo(0,0);
    render();
  }
}

function prev(){
  if(index > 0){
    index--;
    window.scrollTo(0,0);
    render();
  }
}

/* =========================
   SCROLL
========================= */
let scrollInterval;

function startScroll(){
  scrollInterval = setInterval(()=>{
    window.scrollBy(0,1);
  },30);
}

function stopScroll(){
  clearInterval(scrollInterval);
}

/* =========================
   TAP CONTROL
========================= */
document.body.addEventListener("click",(e)=>{
  if(e.target.tagName !== "BUTTON"){
    next();
  }
});

/* INIT */
render();

</script>

</body>
<script>
const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}
</script>
</html>
