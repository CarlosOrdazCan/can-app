<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Equipo | C.A.N.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 40px; }
        .member-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; text-align: center; transition: 0.3s; }
        .member-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .member-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container animate-up">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <button class="secondary" onclick="location.href='index.html'">← VOLVER</button>
            <h1 style="margin:0; letter-spacing:4px; font-weight:900;">NUESTRO EQUIPO</h1>
            <div style="width:100px;"></div>
        </header>

        <div class="team-grid" id="teamGrid"></div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";

        async function load() {
            const res = await fetch("/users", { headers: { "Authorization": `Bearer ${token}` } });
            const users = await res.json();
            
            document.getElementById("teamGrid").innerHTML = users.map(u => `
                <div class="member-card">
                    <img src="${u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=111&color=fff`}" class="member-photo">
                    <div style="font-size:18px; font-weight:900; text-transform:uppercase;">${u.name}</div>
                    <div style="font-size:10px; color:var(--primary); font-weight:900; letter-spacing:2px; margin:10px 0;">${(u.instrument || 'Músico').toUpperCase()}</div>
                    <p style="font-size:12px; color:gray; line-height:1.5;">${u.bio || 'Sin biografía disponible aún.'}</p>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
