<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stage Cantantes | C.A.N. PRO</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #000; overflow-x: hidden; overflow-y: auto; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding-bottom: 150px; }
        body.kids-theme { --primary: #00d2ff; }

        /* Zonas Absolutas/Fijas para mantener estructura */
        .top-center { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .top-left { position: fixed; top: 40px; left: 50px; z-index: 100; max-width: 40%; background: rgba(15, 15, 20, 0.4); padding: 15px 30px; border-radius: 20px; backdrop-filter: blur(50px) saturate(150%); border: 1px solid var(--border); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .top-right { position: fixed; top: 40px; right: 50px; text-align: right; z-index: 100; background: rgba(15, 15, 20, 0.4); padding: 15px 30px; border-radius: 20px; backdrop-filter: blur(50px) saturate(150%); border: 1px solid var(--border); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .bottom-left { position: fixed; bottom: 40px; left: 50px; z-index: 100; }
        .bottom-right { position: fixed; bottom: 40px; right: 50px; text-align: right; z-index: 100; }
        
        /* Letras en 2 Columnas */
        .lyrics-stage { margin-top: 180px; padding: 0 100px; column-count: 2; column-gap: 120px; column-rule: 1px solid #333; }
        
        .song-title { font-size: 50px; font-weight: 900; color: white; margin: 0; text-transform: uppercase; letter-spacing: -1px; }
        .key-display { font-size: 60px; font-weight: 900; color: var(--primary); margin: 0; line-height: 1; }
        
        /* Estilos de Letra */
        .lyrics-block { break-inside: avoid; margin-bottom: 60px; }
        .section-tag { display: inline-block; font-size: 16px; letter-spacing: 5px; color: var(--primary); border: 2px solid var(--primary); padding: 8px 25px; border-radius: 50px; text-transform: uppercase; font-weight: 900; margin-bottom: 20px; background: rgba(0,0,0,0.8); }
        .lyrics-text { font-size: 45px; line-height: 1.6; color: white; white-space: pre-wrap; font-weight: bold; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        
        /* Botones */
        .btn-abandon { background: transparent; border: 2px solid #ff1a1a; color: #ff1a1a; padding: 12px 25px; border-radius: 30px; font-weight: 900; cursor: pointer; letter-spacing: 2px; font-size: 12px; transition: 0.3s; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .btn-abandon:hover { background: #ff1a1a; color: white; }
        
        .btn-nav { background: rgba(255,255,255,0.9); border: none; color: black; padding: 25px 40px; border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        .btn-nav:hover { transform: scale(1.05); }
        
        .preview-text { color: white; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 10px black; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <script>
        const activeMin = localStorage.getItem("activeMinistry") || "Principal";
        if(activeMin === "KIDS") document.body.classList.add("kids-theme");
    </script>

    <div class="top-center">
        <button class="btn-abandon" onclick="location.href='stage-select.html'">ABANDONAR SETLIST</button>
    </div>

    <div class="top-left">
        <h1 id="sName" class="song-title">CARGANDO...</h1>
    </div>

    <div class="top-right">
        <div id="sKey" class="key-display">-</div>
    </div>

    <div id="lyricsArea" class="lyrics-stage"></div>

    <div class="bottom-left">
        <button class="btn-nav" onclick="prev()">← ANTERIOR</button>
    </div>

    <div class="bottom-right">
        <div style="text-align: right;">
            <div id="preview" class="preview-text"></div>
        </div>
        <button class="btn-nav" id="nextBtn" onclick="next()" style="background: var(--primary); color: white;">SIGUIENTE CANCIÓN →</button>
    </div>

    <script src="musicUtils.js"></script>
    <script>
        const setId = new URLSearchParams(window.location.search).get("id");
        let setlist = [];
        let idx = 0;

        async function init() {
            const res = await fetch("/setlists", { headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` } });
            const data = await res.json();
            const s = data.find(x => x._id === setId);
            if(s && s.songs.length > 0) {
                setlist = s.songs;
                render();
            } else {
                location.href = 'stage-select.html';
            }
        }

        function render() {
            const item = setlist[idx];
            const song = item.songId;
            const targetKey = item.setlistKey || song.key;
            const totalSteps = getStepsBetween(song.key, targetKey);

            document.getElementById("sName").innerText = song.name;
            document.getElementById("sKey").innerText = transposeChord(song.key, totalSteps); // Actualiza si fue transportado en el planificador
            
            // Letras en 2 columnas
            document.getElementById("lyricsArea").innerHTML = song.sections.map(sec => `
                <div class="lyrics-block">
                    <span class="section-tag">${sec.name}</span>
                    <div class="lyrics-text">${sec.lyrics || '<span style="color:#555;">[Instrumental]</span>'}</div>
                </div>
            `).join("");

            window.scrollTo(0, 0);

            // Preview y Botones
            const nextS = setlist[idx + 1];
            if (nextS) {
                document.getElementById("preview").innerText = "SIGUIENTE: " + nextS.songId.name;
                document.getElementById("nextBtn").innerText = "SIGUIENTE CANCIÓN →";
                document.getElementById("nextBtn").style.background = "var(--primary)";
                if (activeMin === "KIDS") document.getElementById("nextBtn").style.color = "black";
            } else {
                document.getElementById("preview").innerText = "ÚLTIMA CANCIÓN";
                document.getElementById("nextBtn").innerText = "FINALIZAR SETLIST";
                document.getElementById("nextBtn").style.background = "#ff1a1a";
                document.getElementById("nextBtn").style.color = "white";
            }
        }

        function next() {
            if (idx < setlist.length - 1) { idx++; render(); }
            else { location.href = 'stage-select.html'; }
        }
        function prev() { if (idx > 0) { idx--; render(); } }

        init();
    </script>
</body>
</html>
