<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stage Live | C.A.N.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { 
            --chart-accent: #00d2ff; 
            --bg-dark: #050508; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(24px);
        }
        
        body { 
            background: var(--bg-dark); 
            height: 100vh; 
            overflow: hidden; 
            margin: 0; 
            color: white; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            position: relative;
        }

        /* ORBES DE FONDO PARA EFECTO FRACTAL / GLASSMORPHISM */
        body::before, body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
        }
        body::before {
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, #b300ff 0%, transparent 70%);
            top: -20vh; left: -10vw;
            animation: float1 20s infinite alternate ease-in-out;
        }
        body::after {
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, #00d2ff 0%, transparent 70%);
            bottom: -20vh; right: -10vw;
            animation: float2 25s infinite alternate ease-in-out;
        }
        
        @keyframes float1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10vw, 5vh) scale(1.1); } }
        @keyframes float2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-10vw, -5vh) scale(1.2); } }
        
        .stage-layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; position: relative; z-index: 1; }
        
        /* SIDEBAR GLASSMORPHISM */
        .sidebar { 
            background: rgba(10, 10, 15, 0.4); 
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border); 
            display: flex; flex-direction: column; 
        }
        .sidebar-header { padding: 30px 20px 20px 20px; border-bottom: 1px solid var(--glass-border); background: transparent; }
        .back-btn { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            color: white; padding: 10px 15px; 
            border-radius: 12px; font-size: 11px; cursor: pointer; margin-bottom: 20px; font-weight: 700; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .s-title { font-weight: 900; font-size: 18px; color: white; text-transform: uppercase; margin: 0; letter-spacing: 0.5px; }
        .s-date { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 6px; }
        
        .song-nav { flex-grow: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .song-nav::-webkit-scrollbar { display: none; }
        
        .nav-item { 
            padding: 18px; border-radius: 16px; cursor: pointer; margin-bottom: 8px; border: 1px solid transparent; 
            transition: all 0.3s ease; display: flex; align-items: center; gap: 12px;
            background: transparent;
        }
        .nav-item:hover { background: var(--glass-bg); border-color: var(--glass-border); transform: translateX(5px); }
        .nav-item.active { 
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.15) 0%, rgba(179, 0, 255, 0.05) 100%); 
            border-color: rgba(0, 210, 255, 0.3); 
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.1);
        }
        .n-num { font-size: 14px; font-weight: 900; color: var(--chart-accent); width: 20px; opacity: 0.8; }
        .n-name { font-size: 14px; font-weight: 700; color: white; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
        .n-key { font-size: 10px; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px; color: rgba(255,255,255,0.7); font-weight: bold; border: 1px solid var(--glass-border); }

        /* MAIN: VISOR DEL CHART EN PANTALLA COMPLETA */
        .stage-viewer { display: flex; flex-direction: column; height: 100vh; position: relative; }
        .viewer-header { 
            padding: 20px 40px; 
            background: rgba(5, 5, 10, 0.4); 
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .v-song-title { font-size: 38px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .v-song-meta { font-size: 13px; color: var(--chart-accent); font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 1px; margin-top: 4px; opacity: 0.9; }
        
        /* SELECTOR DE MODOS DE VISTA */
        .view-toggles { display: flex; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 12px; padding: 5px; gap: 5px; margin-right: 20px; backdrop-filter: blur(10px); }
        .v-btn { background: transparent; color: rgba(255,255,255,0.6); border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 800; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .v-btn:hover { color: white; background: rgba(255,255,255,0.05); }
        .v-btn.active { background: white; color: black; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

        /* Controles de Zoom */
        .zoom-controls { display: flex; gap: 8px; }
        .z-btn { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; width: 45px; height: 45px; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: all 0.2s ease; backdrop-filter: blur(10px);
        }
        .z-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .z-btn:active { background: white; color: black; transform: scale(0.95); }

        /* CONTENIDO DEL CHART */
        .chart-content { flex-grow: 1; padding: 50px 60px; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        #renderArea { font-size: 22px; transition: font-size 0.2s ease; }
        
        .empty-stage { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 24px; font-weight: 800; text-align: center; letter-spacing: 1px; }

        /* EL MOTOR DE RENDERIZADO (HYBRID CHARTBUILDER) */
        .song-section { margin-bottom: 50px; }
        .sec-name { 
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, transparent 100%); 
            color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.6em; font-weight: 900; 
            display: inline-block; margin-bottom: 25px; border-left: 4px solid var(--chart-accent); 
            letter-spacing: 3px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        
        .chart-lyric { white-space: pre-wrap; line-height: 2.8; color: rgba(255,255,255,0.9); font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Corchetes/Paréntesis Flotantes (Modo Chart) */
        .c-chord { position: relative; display: inline-block; }
        .c-chord span { position: absolute; bottom: 85%; left: 0; color: var(--chart-accent); font-weight: 900; font-family: monospace; font-size: 0.9em; text-shadow: 0 2px 8px rgba(0,210,255,0.4); }
        
        /* Formato Clásico (Modo Acordes) */
        .old-chords { 
            color: var(--chart-accent); font-family: 'Courier New', monospace; font-weight: bold; margin-bottom: 12px; font-size: 0.85em; 
            background: rgba(0, 0, 0, 0.4); padding: 15px 25px; border-radius: 12px; display: inline-block; 
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* MODO CELULAR */
        @media (max-width: 900px) {
            body::before, body::after { filter: blur(80px); }
            .stage-layout { display: flex; flex-direction: column; }
            .sidebar { height: 35vh; border-right: none; border-bottom: 1px solid var(--glass-border); flex: none; }
            .stage-viewer { flex: 1; height: auto; }
            .viewer-header { flex-wrap: wrap; gap: 15px; padding: 20px; }
            .view-toggles { width: 100%; justify-content: center; margin-right: 0; overflow-x: auto; }
            .v-btn { padding: 10px; font-size: 10px; }
            .chart-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="stage-layout">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="back-btn" onclick="location.href='stage-select.html'">← SALIR DEL STAGE</button>
                <h2 class="s-title" id="setTitle">CARGANDO...</h2>
                <div class="s-date" id="setDate">---</div>
            </div>
            <div class="song-nav" id="navContainer">
                <p style="text-align:center; color:gray; font-size:12px;">Cargando setlist...</p>
            </div>
        </div>

        <div class="stage-viewer">
            <div class="viewer-header" id="viewerHeader" style="display:none;">
                <div style="flex-grow:1;">
                    <h1 class="v-song-title" id="vTitle">TÍTULO CANCIÓN</h1>
                    <div class="v-song-meta" id="vMeta">TONO: - | BPM: -</div>
                </div>
                
                <div class="view-toggles">
                    <button id="btnViewCantante" class="v-btn" onclick="setViewMode('cantante')">🎤 LETRAS</button>
                    <button id="btnViewAcordes" class="v-btn" onclick="setViewMode('acordes')">🎸 ACORDES Y LETRA</button>
                    <button id="btnViewSoloAcordes" class="v-btn" onclick="setViewMode('solo-acordes')">🎹 SOLO ACORDES</button>
                </div>

                <div class="zoom-controls">
                    <!-- Botones de Transposición -->
                    <button class="z-btn" onclick="transposeLive(-1)" style="color:var(--chart-accent); border-color:var(--chart-accent);">♭</button>
                    <button class="z-btn" onclick="transposeLive(1)" style="color:var(--chart-accent); border-color:var(--chart-accent);">♯</button>
                    <div style="width:10px;"></div>
                    <!-- Botones de Zoom -->
                    <button class="z-btn" onclick="changeZoom(-2)">A-</button>
                    <button class="z-btn" onclick="changeZoom(2)">A+</button>
                </div>
            </div>
            
            <div class="chart-content">
                <div id="directorPanel" style="display:none; background:#111; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid var(--chart-accent);">
                    <div style="font-size:10px; color:var(--chart-accent); font-weight:bold; margin-bottom:10px;">PANEL DE DIRECTOR: MODIFICAR ESTRUCTURA EN VIVO</div>
                    <div id="directorBtns" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button onclick="popLiveSection()" style="background:transparent; color:#ff1a1a; border:1px solid #ff1a1a; border-radius:6px; padding:5px 10px; font-size:11px; font-weight:bold; cursor:pointer;">↺ DESHACER ÚLTIMO</button>
                        <button onclick="resetLiveStructure()" style="background:#222; color:white; border:none; border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer;">REINICIAR ESTRUCTURA</button>
                    </div>
                </div>

                <div id="renderArea">
                    <div class="empty-stage">SELECCIONA UNA CANCIÓN DEL SETLIST<br><span style="font-size:12px; font-weight:normal; color:gray; margin-top:10px;">Tu preferencia de vista se guardará automáticamente.</span></div>
                </div>
            </div>
        </div>

    </div>

    <script src="musicUtils.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const token = localStorage.getItem("token");
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('id');
        
        if (!token || !setId) window.location.href = "stage-select.html";

        let currentSetlist = null;
        let activeSongIndex = -1;
        let currentZoom = 22; 
        let isDirector = false;
        let currentLiveSections = [];
        let activeSongId = null;
        let liveTargetKey = null;

        const socket = io();
        
        // Decodificar token para ver si es Director
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role === "Director Musical") isDirector = true;
        } catch(e){}

        // El dispositivo recordará si el músico prefiere Chart, Acordes o Letras. 
        // Si no hay preferencia guardada, el predeterminado será 'acordes' (Acordes y Letra clásica).
        let currentViewMode = localStorage.getItem("stageViewMode") || "acordes";

        async function loadStage() {
            setViewMode(currentViewMode, false);

            try {
                const res = await fetch("/setlists", { headers: { "Authorization": `Bearer ${token}` } });
                const setlists = await res.json();
                currentSetlist = setlists.find(x => x._id === setId);

                if (currentSetlist) {
                    document.getElementById("setTitle").innerText = currentSetlist.name;
                    document.getElementById("setDate").innerText = `${currentSetlist.date || ''} | ${(currentSetlist.timeSlots || []).join(" - ")}`;
                    renderNavigation();
                    
                    // Abrir automáticamente la primera canción válida si no hay ninguna activa
                    if (activeSongIndex === -1 && currentSetlist.songs && currentSetlist.songs.length > 0) {
                        const firstValidIdx = currentSetlist.songs.findIndex(s => s.songId != null);
                        if(firstValidIdx !== -1) openChart(firstValidIdx);
                    }
                } else {
                    alert("No se encontró el Setlist.");
                    window.location.href = "stage-select.html";
                }
            } catch (err) { 
                console.error(err);
                alert("Error de red."); 
            }
        }

        function renderNavigation() {
            const container = document.getElementById("navContainer");
            if (!currentSetlist.songs || currentSetlist.songs.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:gray;'>No hay canciones en este setlist.</p>";
                return;
            }

            container.innerHTML = currentSetlist.songs.map((item, index) => {
                const song = item.songId;
                if (!song) return ''; 
                const displayKey = item.setlistKey ? `${item.setlistKey}*` : (song.key || '-');

                return `
                <div class="nav-item ${activeSongIndex === index ? 'active' : ''}" onclick="openChart(${index})">
                    <div class="n-num">${index + 1}</div>
                    <div class="n-name">${song.name}</div>
                    <div class="n-key">${displayKey}</div>
                </div>`;
            }).join('');
        }

        function setViewMode(mode, reloadChart = true) {
            currentViewMode = mode;
            localStorage.setItem("stageViewMode", mode);
            
            document.querySelectorAll(".v-btn").forEach(b => b.classList.remove("active"));
            if(mode === 'cantante') document.getElementById("btnViewCantante").classList.add("active");
            if(mode === 'acordes') document.getElementById("btnViewAcordes").classList.add("active");
            if(mode === 'solo-acordes') document.getElementById("btnViewSoloAcordes").classList.add("active");
            
            if (reloadChart && activeSongIndex !== -1) openChart(activeSongIndex);
        }

        function transposeLive(steps) {
            if (activeSongIndex === -1) return;
            const item = currentSetlist.songs[activeSongIndex];
            if (!item || !item.songId) return;
            
            if (!liveTargetKey || liveTargetKey === '-') liveTargetKey = item.setlistKey || item.songId.key || "C";
            liveTargetKey = transposeChord(liveTargetKey, steps);
            openChart(activeSongIndex); 
        }

        function openChart(index) {
            const previousIndex = activeSongIndex;
            activeSongIndex = index;
            renderNavigation(); 
            
            const item = currentSetlist.songs[index];
            const song = item ? item.songId : null;
            
            if (!song) {
                document.getElementById("vTitle").innerText = "CANCIÓN ELIMINADA";
                document.getElementById("vMeta").innerText = "-";
                document.getElementById("renderArea").innerHTML = "<div class='empty-stage' style='color:gray; font-size:16px;'>Esta canción fue eliminada de la base de datos.</div>";
                document.getElementById("viewerHeader").style.display = "flex";
                return;
            }
            
            // Si acabamos de cambiar de canción, resetear el tono vivo
            if (previousIndex !== index) {
                liveTargetKey = item.setlistKey || song.key || '-';
            }
            
            document.getElementById("viewerHeader").style.display = "flex";
            document.getElementById("vTitle").innerText = song.name;
            document.getElementById("vMeta").innerText = `TONO: ${liveTargetKey}  |  BPM: ${song.tempo || '-'}`;

            const renderArea = document.getElementById("renderArea");
            renderArea.style.fontSize = currentZoom + "px";

            activeSongId = song._id;
            // Si no estamos modificando la estructura actual (o es nueva), reiniciar
            if (!currentLiveSections.length || previousIndex !== index) {
                currentLiveSections = [...(song.sections || [])];
            }

            if (isDirector) {
                document.getElementById("directorPanel").style.display = "block";
                const btnsDiv = document.getElementById("directorBtns");
                if (song.sections) {
                    btnsDiv.innerHTML = song.sections.map((sec, idx) => 
                        `<button onclick="addLiveSection(${index}, ${idx})" style="background:#222; color:white; border:1px solid #444; border-radius:6px; padding:8px 12px; font-size:12px; font-weight:bold; cursor:pointer;">+ ${sec.name}</button>`
                    ).join('');
                }
            }
            renderArea.style.fontSize = currentZoom + "px";

            // --- EL MOTOR INTELIGENTE (TRANSPOSITOR + DUAL REGEX) ---
            if (currentLiveSections && currentLiveSections.length > 0) {
                const steps = typeof getStepsBetween === 'function' && song.key && liveTargetKey ? getStepsBetween(song.key, liveTargetKey) : 0;
                
                renderArea.innerHTML = currentLiveSections.map(sec => {
                    const safeLyrics = sec.lyrics || '';
                    // Detecta corchetes [G] o paréntesis (G)
                    let hasChordPro = /[\[\(].*?[\]\)]/.test(safeLyrics);
                    
                    // Limpia la letra de acordes y símbolos
                    let cleanLyrics = safeLyrics.replace(/[\[\(].*?[\]\)]/g, ''); 
                    let contentHTML = "";

                    // VISTA 1: CANTANTES (Letra limpia)
                    if (currentViewMode === 'cantante') {
                        contentHTML = `<div class="chart-lyric">${cleanLyrics || '<span style="color:#555;">[Instrumental]</span>'}</div>`;
                    } 
                    // VISTA 2: ACORDES Y LETRA (Clásica, bloques arriba)
                    else if (currentViewMode === 'acordes') {
                        let chordsStr = "";
                        if (sec.chords && sec.chords.length > 0 && sec.chords[0] !== "") {
                            chordsStr = sec.chords.map(c => typeof transposeChord === 'function' ? transposeChord(c, steps) : c).join(' - ');
                        } else if (hasChordPro) {
                            let matches = safeLyrics.match(/[\[\(](.*?)[\]\)]/g);
                            if(matches) {
                                chordsStr = matches.map(m => {
                                    let chord = m.replace(/[\[\(\)\]]/g, '');
                                    return typeof transposeChord === 'function' ? transposeChord(chord, steps) : chord;
                                }).join(' - ');
                            }
                        }
                        let chordsHTML = chordsStr ? `<div class="old-chords">${chordsStr}</div>` : '';
                        contentHTML = `${chordsHTML}<div class="chart-lyric">${cleanLyrics || '<span style="color:#555;">[Instrumental]</span>'}</div>`;
                    } 
                    // VISTA 3: SOLO ACORDES (Oculta la letra)
                    else if (currentViewMode === 'solo-acordes') {
                        let chordsStr = "";
                        if (sec.chords && sec.chords.length > 0 && sec.chords[0] !== "") {
                            chordsStr = sec.chords.map(c => typeof transposeChord === 'function' ? transposeChord(c, steps) : c).join(' - ');
                        } else if (hasChordPro) {
                            let matches = safeLyrics.match(/[\[\(](.*?)[\]\)]/g);
                            if(matches) {
                                chordsStr = matches.map(m => {
                                    let chord = m.replace(/[\[\(\)\]]/g, '');
                                    return typeof transposeChord === 'function' ? transposeChord(chord, steps) : chord;
                                }).join(' - ');
                            }
                        }
                        // Renderizar más grandes y evidentes
                        let chordsHTML = chordsStr ? `<div class="old-chords" style="font-size: 1.5em; padding: 20px; border-color: var(--chart-accent);">${chordsStr}</div>` : '<div style="color:gray; font-size:12px;">(Sin acordes registrados)</div>';
                        contentHTML = chordsHTML;
                    }

                    return `
                    <div class="song-section">
                        <div class="sec-name">${sec.name.toUpperCase()}</div>
                        ${contentHTML}
                    </div>`;
                }).join('');
            } else {
                renderArea.innerHTML = "<div class='empty-stage' style='color:gray; font-size:16px;'>NO HAY LETRA CARGADA PARA ESTA CANCIÓN.</div>";
            }
            
            document.querySelector('.chart-content').scrollTop = 0;
        }

        // --- FUNCIONES DEL DIRECTOR ---
        function addLiveSection(songIdx, secIdx) {
            const originalSong = currentSetlist.songs[songIdx].songId;
            const sec = originalSong.sections[secIdx];
            if (sec) {
                currentLiveSections.push(sec);
                socket.emit('liveStructureChange', { songId: originalSong._id, sections: currentLiveSections });
                openChart(songIdx); // Re-render
            }
        }

        function popLiveSection() {
            if (currentLiveSections.length > 0) {
                currentLiveSections.pop();
                const song = currentSetlist.songs[activeSongIndex].songId;
                socket.emit('liveStructureChange', { songId: song._id, sections: currentLiveSections });
                openChart(activeSongIndex);
            }
        }

        function resetLiveStructure() {
            const song = currentSetlist.songs[activeSongIndex].songId;
            currentLiveSections = [...(song.sections || [])];
            socket.emit('liveStructureChange', { songId: song._id, sections: currentLiveSections });
            openChart(activeSongIndex);
        }

        function changeZoom(val) {
            currentZoom += val;
            if (currentZoom < 14) currentZoom = 14;
            if (currentZoom > 50) currentZoom = 50;
            document.getElementById("renderArea").style.fontSize = currentZoom + "px";
        }

        // Cambio de canciones con pedales Bluetooth o teclado
        document.addEventListener('keydown', function(event) {
            if (activeSongIndex === -1) return;
            if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
                if (activeSongIndex < currentSetlist.songs.length - 1) openChart(activeSongIndex + 1);
            } else if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
                if (activeSongIndex > 0) openChart(activeSongIndex - 1);
            }
        });

        loadStage();
    </script>
</body>
</html>
