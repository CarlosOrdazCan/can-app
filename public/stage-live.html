<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stage Live | C.A.N.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --chart-accent: #00d2ff; --bg-color: #000; }
        body { background: var(--bg-color); height: 100vh; overflow: hidden; margin: 0; color: white; font-family: sans-serif; }
        
        .stage-layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        
        /* SIDEBAR: LISTA DE CANCIONES DEL SETLIST */
        .sidebar { background: #0a0a0c; border-right: 2px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--chart-accent); background: #111; }
        .back-btn { background: transparent; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 8px; font-size: 11px; cursor: pointer; margin-bottom: 15px; font-weight: bold; width: 100%; transition: 0.2s; }
        .back-btn:hover { background: #222; }
        .s-title { font-weight: 900; font-size: 16px; color: white; text-transform: uppercase; margin: 0; }
        .s-date { font-size: 11px; color: gray; margin-top: 5px; }
        
        .song-nav { flex-grow: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .nav-item { padding: 15px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #111; }
        .nav-item.active { background: rgba(0, 210, 255, 0.1); border-color: var(--chart-accent); }
        .n-num { font-size: 14px; font-weight: 900; color: var(--chart-accent); width: 20px; }
        .n-name { font-size: 14px; font-weight: bold; color: white; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .n-key { font-size: 10px; background: #222; padding: 3px 6px; border-radius: 4px; color: gray; }

        /* MAIN: VISOR DEL CHART EN PANTALLA COMPLETA */
        .stage-viewer { display: flex; flex-direction: column; height: 100vh; position: relative; }
        .viewer-header { padding: 15px 40px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .v-song-title { font-size: 32px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .v-song-meta { font-size: 14px; color: var(--chart-accent); font-weight: bold; font-family: monospace; }
        
        /* SELECTOR DE MODOS DE VISTA */
        .view-toggles { display: flex; background: #111; border: 1px solid #333; border-radius: 8px; padding: 4px; gap: 4px; margin-right: 20px; }
        .v-btn { background: transparent; color: gray; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .v-btn:hover { color: white; }
        .v-btn.active { background: var(--chart-accent); color: black; }

        /* Controles de Zoom */
        .zoom-controls { display: flex; gap: 10px; }
        .z-btn { background: #222; border: 1px solid #444; color: white; width: 45px; height: 45px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .z-btn:active { background: var(--chart-accent); color: black; }

        /* CONTENIDO DEL CHART */
        .chart-content { flex-grow: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        #renderArea { font-size: 22px; transition: 0.2s; }
        
        .empty-stage { height: 100%; display: flex; align-items: center; justify-content: center; color: #444; font-size: 24px; font-weight: bold; text-align: center; }

        /* EL MOTOR DE RENDERIZADO (HYBRID CHARTBUILDER) */
        .song-section { margin-bottom: 40px; }
        .sec-name { background: #111; color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.6em; font-weight: bold; display: inline-block; margin-bottom: 25px; border-left: 4px solid var(--chart-accent); letter-spacing: 2px; }
        
        .chart-lyric { white-space: pre-wrap; line-height: 2.8; color: #eee; font-weight: 500; }
        
        /* Corchetes/Paréntesis Flotantes (Modo Chart) */
        .c-chord { position: relative; display: inline-block; }
        .c-chord span { position: absolute; bottom: 85%; left: 0; color: var(--chart-accent); font-weight: 900; font-family: monospace; font-size: 0.9em; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        
        /* Formato Clásico (Modo Acordes) */
        .old-chords { color: var(--chart-accent); font-family: monospace; font-weight: bold; margin-bottom: 10px; font-size: 0.85em; background: rgba(0, 210, 255, 0.05); padding: 10px 20px; border-radius: 10px; display: inline-block; border: 1px solid #222; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }

        /* MODO CELULAR (Por si algún músico lo abre en su iPhone) */
        @media (max-width: 900px) {
            .stage-layout { display: flex; flex-direction: column; }
            .sidebar { height: 35vh; border-right: none; border-bottom: 2px solid #222; flex: none; }
            .stage-viewer { flex: 1; height: auto; }
            .viewer-header { flex-wrap: wrap; gap: 15px; padding: 15px 20px; }
            .view-toggles { width: 100%; justify-content: center; margin-right: 0; }
        }
    </style>
</head>
<body>
    <div class="stage-layout">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="back-btn" onclick="location.href='stage-select.html'">← SALIR DEL STAGE</button>
                <h2 class="s-title" id="setTitle">CARGANDO...</h2>
                <div class="s-date" id="setDate">---</div>
            </div>
            <div class="song-nav" id="navContainer">
                <p style="text-align:center; color:gray; font-size:12px;">Cargando setlist...</p>
            </div>
        </div>

        <div class="stage-viewer">
            <div class="viewer-header" id="viewerHeader" style="display:none;">
                <div style="flex-grow:1;">
                    <h1 class="v-song-title" id="vTitle">TÍTULO CANCIÓN</h1>
                    <div class="v-song-meta" id="vMeta">TONO: - | BPM: -</div>
                </div>
                
                <div class="view-toggles">
                    <button id="btnViewCantante" class="v-btn" onclick="setViewMode('cantante')">🎤 LETRAS</button>
                    <button id="btnViewAcordes" class="v-btn" onclick="setViewMode('acordes')">🎸 ACORDES Y LETRA</button>
                    <button id="btnViewSoloAcordes" class="v-btn" onclick="setViewMode('solo-acordes')">🎹 SOLO ACORDES</button>
                    <button id="btnViewChart" class="v-btn" onclick="setViewMode('chart')">📊 CHART</button>
                </div>

                <div class="zoom-controls">
                    <button class="z-btn" onclick="changeZoom(-2)">A-</button>
                    <button class="z-btn" onclick="changeZoom(2)">A+</button>
                </div>
            </div>
            
            <div class="chart-content">
                <div id="directorPanel" style="display:none; background:#111; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid var(--chart-accent);">
                    <div style="font-size:10px; color:var(--chart-accent); font-weight:bold; margin-bottom:10px;">PANEL DE DIRECTOR: MODIFICAR ESTRUCTURA EN VIVO</div>
                    <div id="directorBtns" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button onclick="popLiveSection()" style="background:transparent; color:#ff1a1a; border:1px solid #ff1a1a; border-radius:6px; padding:5px 10px; font-size:11px; font-weight:bold; cursor:pointer;">↺ DESHACER ÚLTIMO</button>
                        <button onclick="resetLiveStructure()" style="background:#222; color:white; border:none; border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer;">REINICIAR ESTRUCTURA</button>
                    </div>
                </div>

                <div id="renderArea">
                    <div class="empty-stage">SELECCIONA UNA CANCIÓN DEL SETLIST<br><span style="font-size:12px; font-weight:normal; color:gray; margin-top:10px;">Tu preferencia de vista se guardará automáticamente.</span></div>
                </div>
            </div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const token = localStorage.getItem("token");
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('id');
        
        if (!token || !setId) window.location.href = "stage-select.html";

        let currentSetlist = null;
        let activeSongIndex = -1;
        let currentZoom = 22; 
        let isDirector = false;
        let currentLiveSections = [];
        let activeSongId = null;

        const socket = io();
        
        // Decodificar token para ver si es Director
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role === "Director Musical") isDirector = true;
        } catch(e){}

        // El dispositivo recordará si el músico prefiere Chart, Acordes o Letras. 
        // Si no hay preferencia guardada, el predeterminado será 'acordes' (Acordes y Letra clásica).
        let currentViewMode = localStorage.getItem("stageViewMode") || "acordes";

        async function loadStage() {
            setViewMode(currentViewMode, false);

            try {
                const res = await fetch("/setlists", { headers: { "Authorization": `Bearer ${token}` } });
                const setlists = await res.json();
                currentSetlist = setlists.find(x => x._id === setId);

                if (currentSetlist) {
                    document.getElementById("setTitle").innerText = currentSetlist.name;
                    document.getElementById("setDate").innerText = `${currentSetlist.date || ''} | ${(currentSetlist.timeSlots || []).join(" - ")}`;
                    renderNavigation();
                    
                    // Abrir automáticamente la primera canción válida si no hay ninguna activa
                    if (activeSongIndex === -1 && currentSetlist.songs && currentSetlist.songs.length > 0) {
                        const firstValidIdx = currentSetlist.songs.findIndex(s => s.songId != null);
                        if(firstValidIdx !== -1) openChart(firstValidIdx);
                    }
                } else {
                    alert("No se encontró el Setlist.");
                    window.location.href = "stage-select.html";
                }
            } catch (err) { 
                console.error(err);
                alert("Error de red."); 
            }
        }

        function renderNavigation() {
            const container = document.getElementById("navContainer");
            if (!currentSetlist.songs || currentSetlist.songs.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:gray;'>No hay canciones en este setlist.</p>";
                return;
            }

            container.innerHTML = currentSetlist.songs.map((item, index) => {
                const song = item.songId;
                if (!song) return ''; 
                const displayKey = item.setlistKey ? `${item.setlistKey}*` : (song.key || '-');

                return `
                <div class="nav-item ${activeSongIndex === index ? 'active' : ''}" onclick="openChart(${index})">
                    <div class="n-num">${index + 1}</div>
                    <div class="n-name">${song.name}</div>
                    <div class="n-key">${displayKey}</div>
                </div>`;
            }).join('');
        }

        function setViewMode(mode, reloadChart = true) {
            currentViewMode = mode;
            localStorage.setItem("stageViewMode", mode);
            
            document.querySelectorAll(".v-btn").forEach(b => b.classList.remove("active"));
            if(mode === 'cantante') document.getElementById("btnViewCantante").classList.add("active");
            if(mode === 'acordes') document.getElementById("btnViewAcordes").classList.add("active");
            if(mode === 'solo-acordes') document.getElementById("btnViewSoloAcordes").classList.add("active");
            if(mode === 'chart') document.getElementById("btnViewChart").classList.add("active");
            
            if (reloadChart && activeSongIndex !== -1) openChart(activeSongIndex);
        }

        function openChart(index) {
            activeSongIndex = index;
            renderNavigation(); 
            
            const item = currentSetlist.songs[index];
            const song = item ? item.songId : null;
            
            if (!song) {
                document.getElementById("vTitle").innerText = "CANCIÓN ELIMINADA";
                document.getElementById("vMeta").innerText = "-";
                document.getElementById("renderArea").innerHTML = "<div class='empty-stage' style='color:gray; font-size:16px;'>Esta canción fue eliminada de la base de datos.</div>";
                document.getElementById("viewerHeader").style.display = "flex";
                return;
            }
            
            const displayKey = item.setlistKey || song.key || '-';
            
            document.getElementById("viewerHeader").style.display = "flex";
            document.getElementById("vTitle").innerText = song.name;
            document.getElementById("vMeta").innerText = `TONO: ${displayKey}  |  BPM: ${song.tempo || '-'}`;

            const renderArea = document.getElementById("renderArea");
            renderArea.style.fontSize = currentZoom + "px";

            activeSongId = song._id;
            // Si no estamos modificando la estructura actual (o es nueva), reiniciar
            if (!currentLiveSections.length || activeSongIndex !== index) {
                currentLiveSections = [...(song.sections || [])];
            }

            if (isDirector) {
                document.getElementById("directorPanel").style.display = "block";
                const btnsDiv = document.getElementById("directorBtns");
                if (song.sections) {
                    btnsDiv.innerHTML = song.sections.map((sec, idx) => 
                        `<button onclick="addLiveSection(${index}, ${idx})" style="background:#222; color:white; border:1px solid #444; border-radius:6px; padding:8px 12px; font-size:12px; font-weight:bold; cursor:pointer;">+ ${sec.name}</button>`
                    ).join('');
                }
            }
            renderArea.style.fontSize = currentZoom + "px";

            // --- EL MOTOR INTELIGENTE (3 VISTAS + DUAL REGEX) ---
            if (currentLiveSections && currentLiveSections.length > 0) {
                renderArea.innerHTML = currentLiveSections.map(sec => {
                    const safeLyrics = sec.lyrics || '';
                    // Detecta corchetes [G] o paréntesis (G)
                    let hasChordPro = /[\[\(].*?[\]\)]/.test(safeLyrics);
                    
                    // Limpia la letra de acordes y símbolos
                    let cleanLyrics = safeLyrics.replace(/[\[\(].*?[\]\)]/g, ''); 
                    let contentHTML = "";

                    // VISTA 1: CANTANTES (Letra limpia)
                    if (currentViewMode === 'cantante') {
                        contentHTML = `<div class="chart-lyric">${cleanLyrics || '<span style="color:#555;">[Instrumental]</span>'}</div>`;
                    } 
                    // VISTA 2: ACORDES Y LETRA (Clásica, bloques arriba)
                    else if (currentViewMode === 'acordes') {
                        let chordsStr = "";
                        if (sec.chords && sec.chords.length > 0 && sec.chords[0] !== "") {
                            chordsStr = sec.chords.join(' - ');
                        } else if (hasChordPro) {
                            let matches = safeLyrics.match(/[\[\(](.*?)[\]\)]/g);
                            if(matches) {
                                chordsStr = matches.map(m => m.replace(/[\[\(\)\]]/g, '')).join(' - ');
                            }
                        }
                        let chordsHTML = chordsStr ? `<div class="old-chords">${chordsStr}</div>` : '';
                        contentHTML = `${chordsHTML}<div class="chart-lyric">${cleanLyrics || '<span style="color:#555;">[Instrumental]</span>'}</div>`;
                    } 
                    // VISTA 3: SOLO ACORDES (Oculta la letra)
                    else if (currentViewMode === 'solo-acordes') {
                        let chordsStr = "";
                        if (sec.chords && sec.chords.length > 0 && sec.chords[0] !== "") {
                            chordsStr = sec.chords.join(' - ');
                        } else if (hasChordPro) {
                            let matches = safeLyrics.match(/[\[\(](.*?)[\]\)]/g);
                            if(matches) {
                                chordsStr = matches.map(m => m.replace(/[\[\(\)\]]/g, '')).join(' - ');
                            }
                        }
                        // Renderizar más grandes y evidentes
                        let chordsHTML = chordsStr ? `<div class="old-chords" style="font-size: 1.5em; padding: 20px; border-color: var(--chart-accent);">${chordsStr}</div>` : '<div style="color:gray; font-size:12px;">(Sin acordes registrados)</div>';
                        contentHTML = chordsHTML;
                    }
                    // VISTA 4: CHART (Flotante)
                    else if (currentViewMode === 'chart') {
                        if (hasChordPro) {
                            let parsedLyrics = safeLyrics.replace(/[\[\(](.*?)[\]\)]/g, '<span class="c-chord"><span>$1</span></span>');
                            contentHTML = `<div class="chart-lyric">${parsedLyrics}</div>`;
                        } else {
                            let chordsHTML = sec.chords && sec.chords.length > 0 && sec.chords[0] !== "" ? `<div class="old-chords">${sec.chords.join(' - ')}</div>` : '';
                            contentHTML = `${chordsHTML}<div class="chart-lyric">${safeLyrics || '<span style="color:#555;">[Instrumental]</span>'}</div>`;
                        }
                    }

                    return `
                    <div class="song-section">
                        <div class="sec-name">${sec.name.toUpperCase()}</div>
                        ${contentHTML}
                    </div>`;
                }).join('');
            } else {
                renderArea.innerHTML = "<div class='empty-stage' style='color:gray; font-size:16px;'>NO HAY LETRA CARGADA PARA ESTA CANCIÓN.</div>";
            }
            
            document.querySelector('.chart-content').scrollTop = 0;
        }

        // --- FUNCIONES DEL DIRECTOR ---
        function addLiveSection(songIdx, secIdx) {
            const originalSong = currentSetlist.songs[songIdx].songId;
            const sec = originalSong.sections[secIdx];
            if (sec) {
                currentLiveSections.push(sec);
                socket.emit('liveStructureChange', { songId: originalSong._id, sections: currentLiveSections });
                openChart(songIdx); // Re-render
            }
        }

        function popLiveSection() {
            if (currentLiveSections.length > 0) {
                currentLiveSections.pop();
                const song = currentSetlist.songs[activeSongIndex].songId;
                socket.emit('liveStructureChange', { songId: song._id, sections: currentLiveSections });
                openChart(activeSongIndex);
            }
        }

        function resetLiveStructure() {
            const song = currentSetlist.songs[activeSongIndex].songId;
            currentLiveSections = [...(song.sections || [])];
            socket.emit('liveStructureChange', { songId: song._id, sections: currentLiveSections });
            openChart(activeSongIndex);
        }

        function changeZoom(val) {
            currentZoom += val;
            if (currentZoom < 14) currentZoom = 14;
            if (currentZoom > 50) currentZoom = 50;
            document.getElementById("renderArea").style.fontSize = currentZoom + "px";
        }

        // Cambio de canciones con pedales Bluetooth o teclado
        document.addEventListener('keydown', function(event) {
            if (activeSongIndex === -1) return;
            if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
                if (activeSongIndex < currentSetlist.songs.length - 1) openChart(activeSongIndex + 1);
            } else if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
                if (activeSongIndex > 0) openChart(activeSongIndex - 1);
            }
        });

        loadStage();
    </script>
</body>
</html>
