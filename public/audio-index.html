<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio FOH | C.A.N.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --audio-accent: #00ff88; --prod-accent: #b300ff; }
        body { background: #050505; background-image: radial-gradient(circle at 50% 0%, rgba(0,255,136,0.05) 0%, transparent 60%); }
        .mixer-section { background: rgba(255,255,255,0.02); border: 1px solid #222; border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .mixer-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .patch-grid { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 10px; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .patch-grid::-webkit-scrollbar { height: 8px; }
        .patch-grid::-webkit-scrollbar-track { background: #050505; }
        .patch-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .channel-strip { flex: 0 0 120px; background: #0a0a0c; border: 1px solid #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; }
        .channel-strip:hover { border-color: var(--audio-accent); background: #111; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,136,0.1); }
        
        .strip-routing { background: #111; width: 100%; padding: 10px 5px; text-align: center; border-bottom: 1px solid #222; font-size: 9px; font-family: monospace; color: gray; min-height: 55px; display: flex; flex-direction: column; justify-content: center; }
        
        .fader-section { height: 180px; width: 100%; position: relative; background: #050505; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        .fader-track { width: 6px; height: 140px; background: #000; border: 1px solid #222; border-radius: 3px; position: relative; }
        .fader-cap { width: 34px; height: 48px; background: linear-gradient(to bottom, #444, #111); border: 2px solid #555; border-radius: 4px; position: absolute; left: 50%; transform: translateX(-50%); top: 70%; box-shadow: 0 10px 15px rgba(0,0,0,0.9); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: top 0.2s; }
        .fader-cap::after { content: ''; width: 24px; height: 3px; background: var(--audio-accent); border-radius: 2px; box-shadow: 0 0 8px var(--audio-accent); }
        .channel-strip:hover .fader-cap { top: 60%; /* Efecto al hacer hover */ border-color: var(--audio-accent); }
        
        .fader-marks { position: absolute; left: 65%; height: 140px; display: flex; flex-direction: column; justify-content: space-between; font-size: 8px; color: #444; font-family: monospace; pointer-events: none; }
        
        .scribble-strip { background: var(--audio-accent); width: 100%; padding: 8px 5px; text-align: center; color: black; font-weight: 900; font-size: 11px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 1px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        .p-photo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #222; margin: 10px 0 5px 0; }
        .p-inst { font-size: 9px; color: gray; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: #111; padding: 30px; border-radius: 20px; width: 85%; max-width: 1000px; max-height:90vh; overflow-y:auto; border: 1px solid var(--audio-accent); box-shadow: 0 10px 40px rgba(0,255,136,0.1); text-align: center; }
        .m-content input { width: 100%; background: #050505; border: 1px solid #333; color: white; border-radius: 8px; outline: none; font-family: monospace; }
        .m-content input:focus { border-color: var(--audio-accent); }
        
        /* Personal Mix Faders */
        .mix-container { display: flex; overflow-x: auto; gap: 10px; padding: 20px 10px; background: #050505; border-radius: 12px; border: 1px solid #222; margin-top: 15px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .mix-container::-webkit-scrollbar { height: 10px; }
        .mix-container::-webkit-scrollbar-track { background: #111; }
        .mix-container::-webkit-scrollbar-thumb { background: var(--audio-accent); border-radius: 5px; }
        .mix-strip { display: flex; flex-direction: column; align-items: center; min-width: 45px; }
        .mix-ch { font-size: 10px; color: gray; font-weight: bold; margin-bottom: 10px; }
        .mix-val { font-size: 9px; color: var(--audio-accent); font-family: monospace; margin-top: 10px; background: #111; padding: 2px 5px; border-radius: 4px; }
        
        input[type=range][orient=vertical] {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            width: 15px;
            height: 150px;
            background: #222;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";
        let isAdmin = false;
        try {
            const userData = JSON.parse(window.atob(token.split('.')[1]));
            isAdmin = (userData.role === "Full Administrador");
        } catch(e) { window.location.href = "login.html"; }
    </script>

    <div class="container animate-up">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <div>
                <h1 style="margin:0; letter-spacing:4px; font-weight:900; color:white;">AUDIO <span style="color:var(--audio-accent);">FOH</span></h1>
                <p style="color:gray; font-size:12px; letter-spacing:2px; margin-top:5px;">DIRECTORIO Y CABINA</p>
            </div>
            <div style="display:flex; gap:15px;">
                <button class="secondary" onclick="location.href='stage-select.html'" style="font-size:11px; background:var(--audio-accent); color:black; border:none; font-weight:bold;">📊 VER CHARTS / ACORDES</button>
                <button id="btnBackAdmin" class="secondary" onclick="location.href='index.html'" style="display:none; font-size:11px;">← VOLVER AL DASHBOARD</button>
                <button class="secondary" onclick="localStorage.clear(); window.location.href='login.html';" style="font-size:11px;">CERRAR SESIÓN</button>
            </div>
        </header>

        <div class="mixer-section" style="border-top: 3px solid var(--prod-accent);">
            <div class="mixer-header">
                <span style="font-size:24px;">📅</span>
                <h2 style="margin:0; color:var(--prod-accent); letter-spacing:2px;">SERVICIOS PROGRAMADOS</h2>
            </div>
            <div id="liveServicesGrid" style="display:flex; gap:15px; flex-wrap:wrap;"></div>
        </div>

        <div class="mixer-section" style="border-top: 3px solid #ff1a1a;">
            <div class="mixer-header">
                <span style="font-size:24px;">🎚️</span>
                <h2 style="margin:0; color:#ff1a1a; letter-spacing:2px;">CONSOLA: PRINCIPAL</h2>
            </div>
            <div class="patch-grid" id="gridPrincipal"></div>
        </div>

        <div class="mixer-section" style="border-top: 3px solid #00d2ff;">
            <div class="mixer-header">
                <span style="font-size:24px;">🎛️</span>
                <h2 style="margin:0; color:#00d2ff; letter-spacing:2px;">CONSOLA: KIDS</h2>
            </div>
            <div class="patch-grid" id="gridKids"></div>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN MULTIPLE Y MEZCLA -->
    <div id="patchModal" class="modal">
        <div class="m-content">
            <div style="display: flex; gap: 20px; text-align: left; align-items: center; margin-bottom: 20px;">
                <img id="mPhoto" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--audio-accent); object-fit:cover;">
                <div>
                    <h3 id="mName" style="color:white; margin:0; font-weight:900; font-size:24px;">NOMBRE</h3>
                    <p id="mInst" style="color:gray; font-size:12px; margin-top:5px; text-transform:uppercase;">Instrumento</p>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; text-align: left;">
                <!-- PANEL DE RUTEO (PATCH) -->
                <div style="background: #0a0a0c; border: 1px solid #222; border-radius: 12px; padding: 15px;">
                    <label style="font-size:10px; color:white; font-weight:bold; display:block; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">ASIGNACIÓN (RUTEO)</label>
                    <div id="mPatchContainer"></div>
                    <button onclick="addPatchRow()" style="background:transparent; border:1px dashed #444; color:gray; width:100%; padding:10px; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; font-size:10px;">+ AGREGAR LÍNEA</button>
                </div>

                <!-- PANEL DE IN-EARS (MEZCLA) -->
                <div style="background: #0a0a0c; border: 1px solid #222; border-radius: 12px; padding: 15px; overflow: hidden;">
                    <label style="font-size:10px; color:var(--audio-accent); font-weight:bold; display:block; margin-bottom:5px;">MEZCLADORA IN-EAR PERSONAL (48 CANALES)</label>
                    <div style="font-size:9px; color:gray; margin-bottom:10px;">Mueve los faders para ajustar la mezcla del monitor de este músico.</div>
                    
                    <div class="mix-container" id="mMixContainer">
                        <!-- Se llenará con JS -->
                    </div>
                </div>
            </div>

            <input type="hidden" id="mUserId">

            <div style="display:flex; gap:10px; margin-top:30px;">
                <button onclick="saveUserAudioData()" style="flex:2; background:var(--audio-accent); color:black; border:none; border-radius:10px; padding:15px; font-weight:900; cursor:pointer;">GUARDAR CAMBIOS (RUTEO Y MEZCLA)</button>
                <button onclick="closeModal()" style="flex:1; background:#333; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        if (isAdmin) document.getElementById("btnBackAdmin").style.display = "block";
        let allUsers = [];

        async function loadDirectory() {
            try {
                const res = await fetch("/users", { headers: { "Authorization": `Bearer ${token}` } });
                allUsers = await res.json();

                const musicians = allUsers.filter(u => u.ministry !== "Produccion");
                const bandPrincipal = musicians.filter(u => u.ministry === "Principal" || u.ministry === "Hibrido");
                const bandKids = musicians.filter(u => u.ministry === "KIDS" || u.ministry === "Hibrido");

                document.getElementById("gridPrincipal").innerHTML = bandPrincipal.map(u => renderCard(u)).join('') || "<p style='color:gray; font-size:12px;'>No hay músicos asignados.</p>";
                document.getElementById("gridKids").innerHTML = bandKids.map(u => renderCard(u)).join('') || "<p style='color:gray; font-size:12px;'>No hay músicos asignados.</p>";

                const setRes = await fetch("/setlists", { headers: { "Authorization": `Bearer ${token}` } });
                const setlists = await setRes.json();
                const activeSets = setlists.filter(s => !s.archived);

                const servicesGrid = document.getElementById("liveServicesGrid");
                if (activeSets.length > 0) {
                    servicesGrid.innerHTML = activeSets.map(s => `
                        <div style="background:#0a0a0c; border:1px solid #333; padding:15px; border-radius:12px; min-width:250px;">
                            <div style="font-weight:bold; color:white; font-size:14px; margin-bottom:5px;">${s.name.toUpperCase()}</div>
                            <div style="font-size:11px; color:gray; margin-bottom:15px;">${s.date}</div>
                            <button onclick="location.href='prod-live.html?id=${s._id}'" style="background:#ff1a1a; color:white; border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; display:flex; justify-content:center; gap:10px; align-items:center;">
                                <span class="live-badge" style="padding:2px 6px; font-size:9px; animation: pulse 2s infinite; background:white; color:#ff1a1a;">ON AIR</span>
                                ENTRAR A CABINA
                            </button>
                        </div>
                    `).join('');
                } else {
                    servicesGrid.innerHTML = "<p style='color:gray; font-size:12px;'>No hay servicios programados para hoy.</p>";
                }

            } catch (err) { alert("Error cargando el directorio."); }
        }

        function renderCard(u) {
            const photo = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=111&color=fff`;
            
            // GENERAR LA MINI-TABLA DE RUTEO PARA LA TARJETA
            let patchListHTML = "<div style='color:gray;'>Sin patch</div>";
            let activeCh = "-";
            let activeAux = "-";
            
            if (Array.isArray(u.audioChannels) && u.audioChannels.length > 0) {
                const c = u.audioChannels[0]; // Mostrar el principal en el top del strip
                activeCh = c.channel;
                activeAux = c.auxLine;
                patchListHTML = `
                    <div style="color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.inputName || 'MIX'}</div>
                    <div style="color:var(--audio-accent); font-weight:bold; font-size:12px; margin-top:3px;">CH ${activeCh}</div>
                    <div style="color:#00d2ff; font-weight:bold; font-size:9px; margin-top:2px;">AUX ${activeAux}</div>
                `;
            } else if (typeof u.audioChannels === 'string' && u.audioChannels !== "") {
                patchListHTML = `<div style="color:var(--audio-accent);">${u.audioChannels}</div>`;
            }

            // Posición visual inicial del fader (entre 60% y 80%) para que se mueva al hacer hover
            const faderPos = Math.floor(Math.random() * 20) + 60;

            return `
            <div class="channel-strip" onclick="openModal('${u._id}')">
                <div class="strip-routing">${patchListHTML}</div>
                
                <div class="fader-section">
                    <div class="fader-track">
                        <div class="fader-cap" style="top: ${faderPos}%;"></div>
                    </div>
                    <div class="fader-marks">
                        <span>+10</span><span>0</span><span>-10</span><span>-30</span><span>-inf</span>
                    </div>
                </div>
                
                <div class="scribble-strip">${u.name.split(' ')[0]}</div>
                <img class="p-photo" src="${photo}">
                <div class="p-inst">${u.instrument || "N/A"}</div>
            </div>`;
        }

        function openModal(id) {
            const u = allUsers.find(x => x._id === id);
            document.getElementById("mUserId").value = u._id;
            document.getElementById("mName").innerText = u.name.toUpperCase();
            document.getElementById("mInst").innerText = u.instrument || "Sin instrumento";
            document.getElementById("mPhoto").src = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=111&color=fff`;
            
            // RUTEO (PATCH LIST)
            const patchContainer = document.getElementById("mPatchContainer");
            patchContainer.innerHTML = "";
            if (Array.isArray(u.audioChannels) && u.audioChannels.length > 0) {
                u.audioChannels.forEach(c => addPatchRow(c.inputName, c.channel, c.auxLine));
            } else if (typeof u.audioChannels === 'string' && u.audioChannels !== "") {
                addPatchRow(u.audioChannels, "", "");
            } else {
                addPatchRow(); 
            }

            // MEZCLA PERSONAL (48 FADERS)
            const mixContainer = document.getElementById("mMixContainer");
            mixContainer.innerHTML = "";
            
            // Si el usuario no tiene mezcla guardada, iniciamos con 48 canales en 0
            const personalMix = (u.personalMix && u.personalMix.length === 48) 
                ? u.personalMix 
                : Array(48).fill(0);
                
            let fadersHTML = "";
            for(let i = 0; i < 48; i++) {
                const val = personalMix[i];
                // Convertiremos el valor (-100 a +10, o 0 a 100) en el rango deseado.
                // Usaremos un rango de 0 a 100 visualmente, donde 0 es -inf y 100 es +10.
                fadersHTML += `
                <div class="mix-strip">
                    <div class="mix-ch">CH ${i+1}</div>
                    <input type="range" class="mix-fader" orient="vertical" min="0" max="100" value="${val}" oninput="updateFaderVal(this, ${i})">
                    <div class="mix-val" id="mVal_${i}">${val}</div>
                </div>`;
            }
            mixContainer.innerHTML = fadersHTML;

            document.getElementById("patchModal").style.display = "flex";
        }
        
        function updateFaderVal(el, index) {
            document.getElementById(`mVal_${index}`).innerText = el.value;
        }

        function addPatchRow(inst = "", ch = "", aux = "") {
            const div = document.createElement("div");
            div.className = "patch-input-row";
            div.style = "display:grid; grid-template-columns: 1fr 60px 60px 25px; gap:5px; margin-bottom:8px; align-items:center;";
            div.innerHTML = `
                <input type="text" class="pi-inst" placeholder="Ej: Voz Lead" value="${inst}" style="margin:0; padding:10px; font-size:10px;">
                <input type="text" class="pi-ch" placeholder="CH 1" value="${ch}" style="margin:0; padding:10px; font-size:10px; color:var(--audio-accent); text-align:center;">
                <input type="text" class="pi-aux" placeholder="Aux 5" value="${aux}" style="margin:0; padding:10px; font-size:10px; color:#00d2ff; text-align:center;">
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#ff1a1a; cursor:pointer; font-weight:bold; font-size:14px;">✕</button>
            `;
            document.getElementById("mPatchContainer").appendChild(div);
        }

        function closeModal() { document.getElementById("patchModal").style.display = "none"; }

        async function saveUserAudioData() {
            const id = document.getElementById("mUserId").value;
            
            // 1. Recopilar Patch
            const patchRows = Array.from(document.querySelectorAll(".patch-input-row"));
            const audioPatchArray = patchRows.map(row => ({
                inputName: row.querySelector(".pi-inst").value,
                channel: row.querySelector(".pi-ch").value,
                auxLine: row.querySelector(".pi-aux").value
            })).filter(c => c.inputName || c.channel || c.auxLine);

            // 2. Recopilar Mezcla
            const faderInputs = Array.from(document.querySelectorAll(".mix-fader"));
            const personalMixArray = faderInputs.map(f => parseInt(f.value));

            try {
                const res = await fetch(`/users/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ 
                        audioChannels: audioPatchArray,
                        personalMix: personalMixArray
                    })
                });
                if (res.ok) { closeModal(); loadDirectory(); } 
                else { alert("Error al guardar la información de audio."); }
            } catch (err) { alert("Hubo un problema de red."); }
        }

        loadDirectory();
    </script>
</body>
</html>
