<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio FOH | C.A.N.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --audio-accent: #00ff88; --prod-accent: #b300ff; }
        body { background: #050505; background-image: radial-gradient(circle at 50% 0%, rgba(0,255,136,0.05) 0%, transparent 60%); }
        .mixer-section { background: rgba(255,255,255,0.02); border: 1px solid #222; border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .mixer-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .patch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .patch-card { background: #0a0a0c; border: 1px solid #333; border-radius: 12px; padding: 15px; display: flex; align-items: flex-start; gap: 15px; cursor: pointer; transition: 0.3s; }
        .patch-card:hover { border-color: var(--audio-accent); background: rgba(0,255,136,0.05); transform: translateY(-3px); }
        .p-photo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #444; }
        .p-info { flex-grow: 1; min-width: 0; }
        .p-name { font-weight: 900; color: white; font-size: 14px; margin-bottom: 4px; text-transform: uppercase; }
        .p-inst { font-size: 10px; color: gray; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: #111; padding: 30px; border-radius: 20px; width: 450px; max-height:90vh; overflow-y:auto; border: 1px solid var(--audio-accent); box-shadow: 0 10px 40px rgba(0,255,136,0.1); text-align: center; }
        .m-content input { width: 100%; background: #050505; border: 1px solid #333; color: white; border-radius: 8px; outline: none; font-family: monospace; }
        .m-content input:focus { border-color: var(--audio-accent); }
    </style>
</head>
<body>
    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";
        let isAdmin = false;
        try {
            const userData = JSON.parse(window.atob(token.split('.')[1]));
            isAdmin = (userData.role === "Full Administrador");
        } catch(e) { window.location.href = "login.html"; }
    </script>

    <div class="container animate-up">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <div>
                <h1 style="margin:0; letter-spacing:4px; font-weight:900; color:white;">AUDIO <span style="color:var(--audio-accent);">FOH</span></h1>
                <p style="color:gray; font-size:12px; letter-spacing:2px; margin-top:5px;">DIRECTORIO Y CABINA</p>
            </div>
            <div style="display:flex; gap:15px;">
                <button id="btnBackAdmin" class="secondary" onclick="location.href='index.html'" style="display:none; font-size:11px;">← VOLVER AL DASHBOARD</button>
                <button class="secondary" onclick="localStorage.clear(); window.location.href='login.html';" style="font-size:11px;">CERRAR SESIÓN</button>
            </div>
        </header>

        <div class="mixer-section" style="border-top: 3px solid var(--prod-accent);">
            <div class="mixer-header">
                <span style="font-size:24px;">📅</span>
                <h2 style="margin:0; color:var(--prod-accent); letter-spacing:2px;">SERVICIOS PROGRAMADOS</h2>
            </div>
            <div id="liveServicesGrid" style="display:flex; gap:15px; flex-wrap:wrap;"></div>
        </div>

        <div class="mixer-section" style="border-top: 3px solid #ff1a1a;">
            <div class="mixer-header">
                <span style="font-size:24px;">🎚️</span>
                <h2 style="margin:0; color:#ff1a1a; letter-spacing:2px;">CONSOLA: PRINCIPAL</h2>
            </div>
            <div class="patch-grid" id="gridPrincipal"></div>
        </div>

        <div class="mixer-section" style="border-top: 3px solid #00d2ff;">
            <div class="mixer-header">
                <span style="font-size:24px;">🎛️</span>
                <h2 style="margin:0; color:#00d2ff; letter-spacing:2px;">CONSOLA: KIDS</h2>
            </div>
            <div class="patch-grid" id="gridKids"></div>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN MULTIPLE -->
    <div id="patchModal" class="modal">
        <div class="m-content">
            <img id="mPhoto" src="" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--audio-accent); margin-bottom:10px; object-fit:cover;">
            <h3 id="mName" style="color:white; margin:0; font-weight:900;">NOMBRE</h3>
            <p id="mInst" style="color:gray; font-size:11px; margin-top:5px;">Instrumento</p>
            
            <label style="font-size:10px; color:var(--audio-accent); font-weight:bold; display:block; margin-top:20px; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">ASIGNACIÓN DE CANALES Y MONITORES</label>
            
            <!-- CONTENEDOR DINAMICO DE FILAS -->
            <div id="mPatchContainer"></div>
            
            <button onclick="addPatchRow()" style="background:transparent; border:1px dashed var(--audio-accent); color:var(--audio-accent); width:100%; padding:10px; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold;">+ AGREGAR LÍNEA</button>

            <input type="hidden" id="mUserId">

            <div style="display:flex; gap:10px; margin-top:30px;">
                <button onclick="savePatch()" style="flex:2; background:var(--audio-accent); color:black; border:none; border-radius:10px; padding:15px; font-weight:900; cursor:pointer;">GUARDAR RUTEO</button>
                <button onclick="closeModal()" style="flex:1; background:#333; color:white; border:none; border-radius:10px; cursor:pointer;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        if (isAdmin) document.getElementById("btnBackAdmin").style.display = "block";
        let allUsers = [];

        async function loadDirectory() {
            try {
                const res = await fetch("/users", { headers: { "Authorization": `Bearer ${token}` } });
                allUsers = await res.json();

                const musicians = allUsers.filter(u => u.ministry !== "Produccion");
                const bandPrincipal = musicians.filter(u => u.ministry === "Principal" || u.ministry === "Hibrido");
                const bandKids = musicians.filter(u => u.ministry === "KIDS" || u.ministry === "Hibrido");

                document.getElementById("gridPrincipal").innerHTML = bandPrincipal.map(u => renderCard(u)).join('') || "<p style='color:gray; font-size:12px;'>No hay músicos asignados.</p>";
                document.getElementById("gridKids").innerHTML = bandKids.map(u => renderCard(u)).join('') || "<p style='color:gray; font-size:12px;'>No hay músicos asignados.</p>";

                const setRes = await fetch("/setlists", { headers: { "Authorization": `Bearer ${token}` } });
                const setlists = await setRes.json();
                const activeSets = setlists.filter(s => !s.archived);

                const servicesGrid = document.getElementById("liveServicesGrid");
                if (activeSets.length > 0) {
                    servicesGrid.innerHTML = activeSets.map(s => `
                        <div style="background:#0a0a0c; border:1px solid #333; padding:15px; border-radius:12px; min-width:250px;">
                            <div style="font-weight:bold; color:white; font-size:14px; margin-bottom:5px;">${s.name.toUpperCase()}</div>
                            <div style="font-size:11px; color:gray; margin-bottom:15px;">${s.date}</div>
                            <button onclick="location.href='prod-live.html?id=${s._id}'" style="background:#ff1a1a; color:white; border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; display:flex; justify-content:center; gap:10px; align-items:center;">
                                <span class="live-badge" style="padding:2px 6px; font-size:9px; animation: pulse 2s infinite; background:white; color:#ff1a1a;">ON AIR</span>
                                ENTRAR A CABINA
                            </button>
                        </div>
                    `).join('');
                } else {
                    servicesGrid.innerHTML = "<p style='color:gray; font-size:12px;'>No hay servicios programados para hoy.</p>";
                }

            } catch (err) { alert("Error cargando el directorio."); }
        }

        function renderCard(u) {
            const photo = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=111&color=fff`;
            
            // GENERAR LA MINI-TABLA DE RUTEO PARA LA TARJETA
            let patchListHTML = "<div style='font-size:10px; color:gray; margin-top:5px;'>Sin ruteo asignado</div>";
            if (Array.isArray(u.audioChannels) && u.audioChannels.length > 0) {
                patchListHTML = `
                <div style="background:rgba(0,0,0,0.5); padding:8px; border-radius:8px; margin-top:10px; border:1px solid #222;">
                    <div style="display:grid; grid-template-columns: 1fr 40px 40px; gap:5px; font-size:8px; color:gray; font-weight:bold; border-bottom:1px solid #333; padding-bottom:4px; margin-bottom:4px;">
                        <div>FUENTE</div><div>CH</div><div style="color:#00d2ff;">AUX</div>
                    </div>
                    ${u.audioChannels.map(c => `
                        <div style="display:grid; grid-template-columns: 1fr 40px 40px; gap:5px; font-size:11px; margin-bottom:3px;">
                            <div style="color:#ddd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.inputName}</div>
                            <div style="color:var(--audio-accent); font-family:monospace; font-weight:bold;">${c.channel}</div>
                            <div style="color:#00d2ff; font-family:monospace; font-weight:bold;">${c.auxLine}</div>
                        </div>
                    `).join('')}
                </div>`;
            } else if (typeof u.audioChannels === 'string' && u.audioChannels !== "") {
                // Por si queda algún dato viejo guardado como texto
                patchListHTML = `<div style="color:var(--audio-accent); font-family:monospace; font-size:11px; margin-top:5px;">${u.audioChannels}</div>`;
            }

            return `
            <div class="patch-card" onclick="openModal('${u._id}')">
                <img class="p-photo" src="${photo}">
                <div class="p-info">
                    <div class="p-name">${u.name}</div>
                    <div class="p-inst">${u.instrument || "N/A"}</div>
                    ${patchListHTML}
                </div>
            </div>`;
        }

        function openModal(id) {
            const u = allUsers.find(x => x._id === id);
            document.getElementById("mUserId").value = u._id;
            document.getElementById("mName").innerText = u.name.toUpperCase();
            document.getElementById("mInst").innerText = u.instrument || "Sin instrumento";
            document.getElementById("mPhoto").src = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=111&color=fff`;
            
            const container = document.getElementById("mPatchContainer");
            container.innerHTML = "";
            
            // Si ya tiene arreglos, creamos sus filas
            if (Array.isArray(u.audioChannels) && u.audioChannels.length > 0) {
                u.audioChannels.forEach(c => addPatchRow(c.inputName, c.channel, c.auxLine));
            } else if (typeof u.audioChannels === 'string' && u.audioChannels !== "") {
                addPatchRow(u.audioChannels, "", ""); // Migrar texto viejo
            } else {
                addPatchRow(); // Fila vacía inicial
            }

            document.getElementById("patchModal").style.display = "flex";
        }

        function addPatchRow(inst = "", ch = "", aux = "") {
            const div = document.createElement("div");
            div.className = "patch-input-row";
            div.style = "display:grid; grid-template-columns: 1fr 70px 70px 30px; gap:5px; margin-bottom:8px; align-items:center;";
            div.innerHTML = `
                <input type="text" class="pi-inst" placeholder="Ej: Voz Lead" value="${inst}" style="margin:0; padding:10px; font-size:12px;">
                <input type="text" class="pi-ch" placeholder="CH 1" value="${ch}" style="margin:0; padding:10px; font-size:12px; color:var(--audio-accent); text-align:center;">
                <input type="text" class="pi-aux" placeholder="Aux 5" value="${aux}" style="margin:0; padding:10px; font-size:12px; color:#00d2ff; text-align:center;">
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#ff1a1a; cursor:pointer; font-weight:bold; font-size:16px;">✕</button>
            `;
            document.getElementById("mPatchContainer").appendChild(div);
        }

        function closeModal() { document.getElementById("patchModal").style.display = "none"; }

        async function savePatch() {
            const id = document.getElementById("mUserId").value;
            const rows = Array.from(document.querySelectorAll(".patch-input-row"));
            
            // Recopilamos todos los inputs y filtramos si la fila está vacía
            const audioPatchArray = rows.map(row => ({
                inputName: row.querySelector(".pi-inst").value,
                channel: row.querySelector(".pi-ch").value,
                auxLine: row.querySelector(".pi-aux").value
            })).filter(c => c.inputName || c.channel || c.auxLine);

            try {
                const res = await fetch(`/users/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ audioChannels: audioPatchArray }) // Enviamos el arreglo completo
                });
                if (res.ok) { closeModal(); loadDirectory(); } 
                else { alert("Error al guardar el Patch List."); }
            } catch (err) { alert("Hubo un problema de red."); }
        }

        loadDirectory();
    </script>
</body>
</html>
