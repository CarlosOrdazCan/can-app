<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión | C.A.N.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .u-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; }
        .u-card { background: rgba(15, 15, 20, 0.4); backdrop-filter: blur(50px) saturate(150%); border: 1px solid var(--border); border-radius: 28px; padding: 30px; text-align: center; position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        .u-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .u-photo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        
        .modal-glass input[type="text"], .modal-glass input[type="password"], .modal-glass select { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; outline: none; transition: 0.3s; }
        .modal-glass input[type="text"]:focus, .modal-glass input[type="password"]:focus, .modal-glass select:focus { border-color: var(--primary); background: rgba(0,0,0,0.8); }
        
        /* Estilos para los Checkboxes múltiples */
        .cb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; text-align: left; }
        .cb-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: white; cursor: pointer; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .cb-label:hover { border-color: #b300ff; background: rgba(179,0,255,0.1); }
        .cb-label input { accent-color: #b300ff; transform: scale(1.2); }
    </style>
</head>
<body>
    <script>
        const tokenGuard = localStorage.getItem("token");
        if (!tokenGuard) { window.location.href = "login.html"; } 
        else {
            try {
                const userDataGuard = JSON.parse(window.atob(tokenGuard.split('.')[1]));
                if (userDataGuard.role !== "Full Administrador") window.location.replace("index.html");
            } catch(e) { window.location.href = "login.html"; }
        }
    </script>

    <div class="container animate-up">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <button class="secondary" onclick="location.href='index.html'">← VOLVER</button>
            <h1 style="font-weight:900;">GESTIÓN</h1>
            <button onclick="openModal()" style="background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:12px; font-weight:bold;">+ NUEVO</button>
        </header>
        <div class="u-grid" id="uGrid"></div>
    </div>

    <div id="uModal" class="modal-overlay">
        <div class="modal-glass" style="width: 450px;">
            <h2 id="mTitle" style="color:var(--primary); text-align:center; font-weight:900; margin-bottom:20px;">PERFIL DE USUARIO</h2>
            <input type="hidden" id="uId">
            
            <label style="font-size:10px; color:gray; font-weight:bold;">NOMBRE Y USUARIO</label>
            <input type="text" id="uName" placeholder="Nombre Completo">
            <input type="text" id="uUser" placeholder="Nombre de Usuario (Para Login)">
            <input type="password" id="uPass" placeholder="Contraseña (vacío para no cambiar)">
            
            <label style="font-size:10px; color:gray; font-weight:bold; display:block; margin-top:15px;">ROL EN LA BANDA / EQUIPO</label>
            <input type="text" id="uInst" placeholder="Instrumento o Función (Ej: Batería, Letras)">
            
            <label style="font-size:10px; color:gray; font-weight:bold; display:block; margin-top:15px;">PERMISOS Y ENTORNO</label>
            <select id="uRole">
                <option value="Viewer">Viewer (Solo lectura)</option>
                <option value="Editor">Editor (Crea Sets)</option>
                <option value="Full Administrador">Full Administrador</option>
            </select>
            <select id="uMin" onchange="toggleTechBranch()">
                <option value="Principal">Principal</option>
                <option value="KIDS">KIDS</option>
                <option value="Hibrido">Híbrido</option>
                <option value="Produccion">Producción Técnica</option>
            </select>

            <!-- CAJA DINÁMICA: Checkboxes para Producción -->
            <div id="techBranchContainer" style="display:none; margin-top:15px; padding:15px; background:rgba(179,0,255,0.05); border:1px solid #b300ff; border-radius:10px;">
                <label style="font-size:10px; color:#b300ff; font-weight:bold; display:block;">ÁREAS TÉCNICAS (Selecciona varias)</label>
                <div class="cb-grid">
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Full"> Full (Director)</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Audio"> Audio (FOH)</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Video"> Video</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Switcher"> Switcher</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="ProPresenter"> ProPresenter</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Arena"> Arena</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Iluminación"> Iluminación</label>
                    <label class="cb-label"><input type="checkbox" class="t-branch" value="Contents"> Contents</label>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:30px;">
                <button onclick="saveUser()" style="flex:2; background:var(--primary); color:white; border:none; border-radius:10px; padding:15px; font-weight:bold; cursor:pointer;">GUARDAR</button>
                <button onclick="closeModal()" style="flex:1; background:#333; color:white; border:none; border-radius:10px; cursor:pointer;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        let users = [];

        async function load() {
            const res = await fetch("/users", { headers: { "Authorization": `Bearer ${token}` } });
            users = await res.json();
            document.getElementById("uGrid").innerHTML = users.map(u => {
                const minColor = u.ministry === "Produccion" ? "#b300ff" : "gray";
                const techBadge = u.ministry === "Produccion" && u.techBranch ? ` | <span style="color:#b300ff; font-size:9px;">${u.techBranch}</span>` : '';

                return `
                <div class="u-card">
                    <img class="u-photo" src="${u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=111&color=fff`}">
                    <div style="font-weight:900; font-size:18px;">${u.name.toUpperCase()}</div>
                    <div style="color:var(--primary); font-size:11px; margin-bottom:10px;">@${u.username} | ${u.instrument}</div>
                    <div style="font-size:10px; color:${minColor}; font-weight:bold;">${u.role} | ${u.ministry}${techBadge}</div>
                    <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                        <button class="secondary" style="font-size:10px; padding: 10px 15px;" onclick="openModal('${u._id}')">EDITAR</button>
                        <button class="secondary" style="font-size:10px; color:red; padding: 10px 15px;" onclick="del('${u._id}')">✕</button>
                    </div>
                </div>
            `}).join('');
        }

        function toggleTechBranch() {
            const isProd = document.getElementById("uMin").value === "Produccion";
            document.getElementById("techBranchContainer").style.display = isProd ? "block" : "none";
        }

        function openModal(id = null) {
            const u = id ? users.find(x => x._id === id) : {};
            document.getElementById("uId").value = id || "";
            document.getElementById("uName").value = u.name || "";
            document.getElementById("uUser").value = u.username || "";
            document.getElementById("uInst").value = u.instrument || "";
            document.getElementById("uRole").value = u.role || "Viewer";
            document.getElementById("uMin").value = u.ministry || "Principal";
            
            // Marcar los checkboxes guardados previamente
            const savedBranches = u.techBranch ? u.techBranch.split(', ') : [];
            document.querySelectorAll('.t-branch').forEach(cb => {
                cb.checked = savedBranches.includes(cb.value);
            });
            
            toggleTechBranch(); 
            const modal = document.getElementById("uModal");
            modal.style.display = "flex";
            setTimeout(() => modal.classList.add("active"), 10);
        }
        
        function closeModal() { 
            const modal = document.getElementById("uModal");
            modal.classList.remove("active");
            setTimeout(() => modal.style.display = "none", 400);
        }

        async function saveUser() {
            const id = document.getElementById("uId").value;
            
            // Juntar todos los checkboxes seleccionados separados por coma
            const selectedBranches = Array.from(document.querySelectorAll('.t-branch:checked')).map(cb => cb.value).join(', ');

            const data = {
                name: document.getElementById("uName").value,
                username: document.getElementById("uUser").value,
                instrument: document.getElementById("uInst").value,
                role: document.getElementById("uRole").value,
                ministry: document.getElementById("uMin").value,
                techBranch: document.getElementById("uMin").value === "Produccion" ? selectedBranches : ""
            };
            const pass = document.getElementById("uPass").value;
            if(pass) data.password = pass;

            await fetch(id ? `/users/${id}` : "/users", {
                method: id ? "PUT" : "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            closeModal(); load();
        }

        async function del(id) { 
            if(confirm("¿Seguro que deseas eliminar este usuario de forma permanente?")) { 
                await fetch(`/users/${id}`, { method: 'DELETE', headers: {"Authorization":`Bearer ${token}`} }); 
                load(); 
            } 
        }
        load();
    </script>
</body>
</html>
