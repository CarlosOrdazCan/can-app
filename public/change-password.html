<!DOCTYPE html>
<html>
<head>
  <script>
  if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
  }
</script>
<title>Cambiar contraseña</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container animate-up" style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
  <div class="glass-card" style="max-width: 400px; width: 100%; text-align:center;">
    <h1 style="font-size:24px; font-weight:900; letter-spacing:1px; margin-bottom:10px;">🔐 Cambia tu contraseña</h1>
    <p style="color:var(--text-dim); font-size:12px; margin-bottom:30px;">Por seguridad, debes actualizar tu contraseña antes de continuar.</p>

    <div style="text-align:left; margin-bottom:20px;">
        <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px; color:gray;">NUEVA CONTRASEÑA</label>
        <input id="newPass" type="password" placeholder="Ingresa tu nueva contraseña" style="width:100%; box-sizing:border-box;">
    </div>

    <button onclick="changePass()" style="width:100%; font-size:14px; padding:15px; border-radius:12px;">GUARDAR Y CONTINUAR</button>
  </div>
</div>

<script>

async function changePass(){

  const token = localStorage.getItem("token");

  await fetch("/profile", {
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({
      password: document.getElementById("newPass").value,
      mustChangePassword: false
    })
  });

  alert("Contraseña actualizada");

  window.location.href = "index.html";
}

</script>

</body>
</html>
