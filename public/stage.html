<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stage Músicos | C.A.N. PRO</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #000; overflow: hidden; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body.kids-theme { --primary: #00d2ff; }

        /* Zonas Absolutas */
        .top-center { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .top-left { position: absolute; top: 40px; left: 50px; z-index: 100; max-width: 40%; }
        .top-right { position: absolute; top: 40px; right: 50px; text-align: right; z-index: 100; }
        .bottom-left { position: absolute; bottom: 40px; left: 50px; z-index: 100; }
        .bottom-right { position: absolute; bottom: 40px; right: 50px; text-align: right; z-index: 100; }
        
        .center-stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 100px; }
        
        /* Tipografías Live */
        .song-title { font-size: 50px; font-weight: 900; color: white; margin: 0; text-transform: uppercase; letter-spacing: -1px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .key-display { font-size: 60px; font-weight: 900; color: var(--primary); margin: 0; line-height: 1; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .tempo-display { font-size: 20px; color: gray; font-weight: bold; margin-top: 5px; }
        
        /* Acordes Gigantes */
        .chords-block { font-family: 'Courier New', Courier, monospace; font-size: 70px; font-weight: bold; color: white; line-height: 1.5; letter-spacing: 15px; width: 100%; max-height: 60vh; overflow-y: auto; scrollbar-width: none; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .chords-block::-webkit-scrollbar { display: none; }
        .section-tag { display: block; font-size: 18px; color: var(--primary); letter-spacing: 5px; margin-top: 40px; margin-bottom: 10px; font-weight: 900; font-family: sans-serif; text-transform: uppercase; }
        
        /* Botones */
        .btn-abandon { background: transparent; border: 2px solid #ff1a1a; color: #ff1a1a; padding: 12px 25px; border-radius: 30px; font-weight: 900; cursor: pointer; letter-spacing: 2px; font-size: 12px; transition: 0.3s; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .btn-abandon:hover { background: #ff1a1a; color: white; }
        
        .btn-nav { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 25px 40px; border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-nav:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.05); }
        .kids-theme .btn-nav:hover { color: #000; }
        
        .preview-text { color: gray; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .transpose-controls { display: flex; justify-content: flex-end; gap: 5px; margin-top: 15px; }
        .btn-trans { background: #222; border: 1px solid #444; color: white; width: 40px; height: 40px; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-trans:hover { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
    <script>
        const activeMin = localStorage.getItem("activeMinistry") || "Principal";
        if(activeMin === "KIDS") document.body.classList.add("kids-theme");
    </script>

    <div class="top-center">
        <button class="btn-abandon" onclick="location.href='stage-select.html'">ABANDONAR SETLIST</button>
    </div>

    <div class="top-left">
        <h1 id="sName" class="song-title">CARGANDO...</h1>
    </div>

    <div class="top-right">
        <div id="sKey" class="key-display">-</div>
        <div id="sTempo" class="tempo-display">- BPM</div>
        <div class="transpose-controls">
            <button class="btn-trans" onclick="adjustTranspose(-1)">-</button>
            <button class="btn-trans" onclick="adjustTranspose(1)">+</button>
        </div>
        <div id="transIndicator" style="color:var(--primary); font-size:12px; font-weight:bold; margin-top:5px; display:none;"></div>
    </div>

    <div class="center-stage">
        <div id="chordsArea" class="chords-block"></div>
    </div>

    <div class="bottom-left">
        <button class="btn-nav" onclick="prev()">← ANTERIOR</button>
    </div>

    <div class="bottom-right">
        <div id="preview" class="preview-text"></div>
        <button class="btn-nav" id="nextBtn" onclick="next()">SIGUIENTE CANCIÓN →</button>
    </div>

    <script src="musicUtils.js"></script>
    <script>
        const setId = new URLSearchParams(window.location.search).get("id");
        let setlist = [];
        let idx = 0;
        let manualSteps = 0;

        async function init() {
            const res = await fetch("/setlists", { headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` } });
            const data = await res.json();
            const s = data.find(x => x._id === setId);
            if(s && s.songs.length > 0) {
                setlist = s.songs;
                loadSong();
            } else {
                location.href = 'stage-select.html';
            }
        }

        function adjustTranspose(val) {
            manualSteps += val;
            
            const indicator = document.getElementById("transIndicator");
            indicator.style.display = manualSteps === 0 ? "none" : "block";
            indicator.innerText = manualSteps > 0 ? `+${manualSteps} ST` : `${manualSteps} ST`;
            
            render();
        }

        function loadSong() {
            manualSteps = 0; // Reiniciar al cambiar de canción
            document.getElementById("transIndicator").style.display = "none";
            render();
        }

        function render() {
            const item = setlist[idx];
            const song = item.songId;
            const targetKey = item.setlistKey || song.key;
            
            // Pasos automáticos del planificador + pasos manuales del botón en vivo
            const totalSteps = getStepsBetween(song.key, targetKey) + manualSteps;

            document.getElementById("sName").innerText = song.name;
            document.getElementById("sKey").innerText = transposeChord(song.key, totalSteps);
            document.getElementById("sTempo").innerText = song.tempo ? `${song.tempo} BPM` : '-- BPM';
            
            // Renderizar acordes
            document.getElementById("chordsArea").innerHTML = song.sections.map(sec => `
                <span class="section-tag">${sec.name}</span>
                ${sec.chords.map(c => transposeChord(c, totalSteps)).join(' ')}
            `).join("");

            // Preview y Botón Siguiente
            const nextS = setlist[idx + 1];
            if (nextS) {
                document.getElementById("preview").innerText = "SIGUIENTE: " + nextS.songId.name;
                document.getElementById("nextBtn").innerText = "SIGUIENTE CANCIÓN →";
                document.getElementById("nextBtn").style.background = "rgba(255,255,255,0.1)";
                document.getElementById("nextBtn").style.color = "white";
            } else {
                document.getElementById("preview").innerText = "ÚLTIMA CANCIÓN";
                document.getElementById("nextBtn").innerText = "FINALIZAR SETLIST";
                document.getElementById("nextBtn").style.background = "#ff1a1a";
                document.getElementById("nextBtn").style.color = "white";
                document.getElementById("nextBtn").style.borderColor = "#ff1a1a";
            }
        }

        function next() {
            if (idx < setlist.length - 1) { idx++; loadSong(); }
            else { location.href = 'stage-select.html'; }
        }
        function prev() { if (idx > 0) { idx--; loadSong(); } }

        init();
    </script>
</body>
</html>
