<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | C.A.N. Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;">
    <div class="login-card animate-up" style="background:rgba(15, 15, 20, 0.4); backdrop-filter:blur(50px) saturate(150%); padding:50px; border-radius:30px; border:1px solid var(--border); width:100%; max-width:400px; text-align:center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
        <h1 style="color:white; letter-spacing:5px; font-weight:900; margin-bottom: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.2);">C.A.N.</h1>
        <p style="color:var(--primary); font-size:10px; margin-bottom:30px; letter-spacing: 2px; font-weight:bold;">ACCESO AUTORIZADO</p>
        
        <div id="login-form">
            <input type="text" id="userInput" placeholder="Usuario" style="width:100%; padding:15px; margin-bottom:20px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:12px; outline:none; transition:0.3s; box-sizing:border-box;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
            <input type="password" id="passInput" placeholder="Contraseña" style="width:100%; padding:15px; margin-bottom:20px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:12px; outline:none; transition:0.3s; box-sizing:border-box;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
            <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; transition:0.3s; box-shadow: 0 5px 20px rgba(255,26,26,0.3);" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">ENTRAR</button>
        </div>

        <div id="hybrid-selector" style="display:none; margin-top:10px;">
            <p style="color:white; font-size:12px; font-weight:bold; margin-bottom:20px;">SELECCIONA TU ENTORNO</p>
            <button onclick="selectMin('Principal')" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer; margin-bottom:15px; transition:0.3s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">ALABANZA PRINCIPAL</button>
            <button onclick="selectMin('KIDS')" style="width:100%; padding:15px; background:rgba(0,210,255,0.1); color:#00d2ff; border:1px solid #00d2ff; border-radius:12px; font-weight:900; cursor:pointer; transition:0.3s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">ALABANZA KIDS</button>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById("userInput").value;
            const password = document.getElementById("passInput").value;

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("token", data.token);
                    
                    if (data.user.ministry === "Hibrido") {
                        document.getElementById("login-form").style.display = "none";
                        document.getElementById("hybrid-selector").style.display = "block";
                    } else {
                        localStorage.setItem("activeMinistry", data.user.ministry || "Principal");
                        window.location.href = "index.html";
                    }
                } else {
                    alert("Credenciales incorrectas");
                }
            } catch (err) {
                alert("Error de conexión con el servidor.");
            }
        }

        function selectMin(min) {
            localStorage.setItem("activeMinistry", min);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
